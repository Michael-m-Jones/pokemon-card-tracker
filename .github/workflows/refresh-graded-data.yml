name: Refresh PriceCharting and PSA data

on:
  schedule:
    - cron: "35 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: card-data
  cancel-in-progress: false

jobs:
  refresh-graded-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Refresh market and grading data
        env:
          POKEMONTCG_API_KEY: ${{ secrets.POKEMONTCG_API_KEY }}
          REFRESH_PRICECHARTING: "true"
        run: node scripts/update-prices.mjs

      - name: Validate data
        run: node scripts/validate-data.mjs

      - name: Commit refreshed data
        run: |
          if git diff --quiet data/cards.json; then
            echo "No price changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cards.json
          git commit -m "Refresh PriceCharting and PSA data"
          git push
